<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pennypilot — Authentication</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <!-- FontAwesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- Icons8 Line Awesome CDN -->
  <link rel="stylesheet" href="https://maxst.icons8.com/vue-static/landings/line-awesome/line-awesome/1.3.0/css/line-awesome.min.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-primary);
      margin: 0;
      padding: 20px;
    }
    .auth-wrapper {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    .auth-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 24px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }
    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    .auth-title {
      font-family: var(--font-display);
      font-size: 22px;
      color: var(--text-primary);
      margin: 0;
    }
    .auth-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 8px;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .form-group {
      position: relative;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: all var(--transition);
    }
    .form-group input:focus, .form-group select:focus {
      border-color: var(--accent);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    
    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .password-wrapper input {
      padding-right: 48px;
    }
    .toggle-pwd {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .toggle-pwd:hover {
      color: var(--text-primary);
    }

    .auth-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      margin-top: 12px;
      transition: all var(--transition);
      box-shadow: 0 4px 12px var(--accent-glow);
    }
    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px var(--accent-glow);
      background: #c4b5fd;
    }
    .auth-btn:active {
      transform: translateY(0);
    }
    
    .auth-switch {
      text-align: center;
      margin-top: 28px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .auth-switch a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      margin-left: 4px;
      transition: color var(--transition);
    }
    .auth-switch a:hover {
      text-decoration: underline;
      color: #c4b5fd;
    }
    
    .auth-section {
      display: none;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s ease;
    }
    .auth-section.active {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    /* Toast Notification styles for Auth page */
    .toast-auth {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: var(--bg-card);
      border: 1px solid var(--accent);
      color: var(--text-primary);
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 9999;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      opacity: 0;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: none;
    }
    .toast-auth.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>

  <div id="authToast" class="toast-auth">
    <span id="authToastIcon">ℹ</span>
    <span id="authToastMsg">Message</span>
  </div>

  <div class="auth-wrapper">
    <div class="auth-container">
      <div class="auth-header">
        <div class="auth-logo">Pennypilot</div>
        <h1 class="auth-title" id="authTitle">Welcome Back</h1>
        <p class="auth-subtitle" id="authSubtitle">Enter your credentials to continue</p>
      </div>

      <!-- LOGIN FORM -->
      <div class="auth-section active" id="loginSection">
        <form class="auth-form" onsubmit="event.preventDefault(); handleLogin();">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="e.g. hello@example.com" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="password-wrapper">
              <input type="password" id="loginPassword" placeholder="Enter your password" required />
              <button type="button" class="toggle-pwd" onclick="togglePassword('loginPassword', this)">👁</button>
            </div>
          </div>
          <button type="submit" class="auth-btn">Log In</button>
        </form>
        <div class="auth-switch">
          Don't have an account? <a href="#" onclick="switchTab('signup')">Sign Up</a>
        </div>
      </div>

      <!-- SIGNUP FORM -->
      <div class="auth-section" id="signupSection">
        <form class="auth-form" onsubmit="event.preventDefault(); handleSignup();">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="regFullName" placeholder="e.g. Jane Doe" required />
          </div>
          <div class="form-group">
            <label>Nickname</label>
            <input type="text" id="regNickname" placeholder="e.g. Janie" required />
          </div>
          <div class="form-group">
            <label>Mobile Number</label>
            <input type="tel" id="regMobile" placeholder="e.g. +234 800 000 0000" required />
          </div>
          <div class="form-group">
            <label>Address</label>
            <input type="text" id="regAddress" placeholder="e.g. 123 Main St" required />
          </div>
          <div class="form-group">
            <label>Gender</label>
            <select id="regGender" required>
              <option value="">Select Gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
              <option value="Prefer not to say">Prefer not to say</option>
            </select>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="regEmail" placeholder="e.g. hello@example.com" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="password-wrapper">
              <input type="password" id="regPassword" placeholder="Create a strong password" required />
              <button type="button" class="toggle-pwd" onclick="togglePassword('regPassword', this)">👁</button>
            </div>
          </div>
          
          <button type="submit" class="auth-btn">Create Account</button>
        </form>
        <div class="auth-switch">
          Already have an account? <a href="#" onclick="switchTab('login')">Log In</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // State initialization
    let appState = {};
    const saved = localStorage.getItem('flowfund_state');
    if (saved) {
      try { appState = JSON.parse(saved); } catch(e){}
    }

    // Auto-redirect if already logged in
    if (appState && appState.userProfile && appState.userProfile.email) {
      window.location.href = 'index.html';
    }

    function showToast(message, type = 'info') {
      const toast = document.getElementById('authToast');
      const msgEl = document.getElementById('authToastMsg');
      const iconEl = document.getElementById('authToastIcon');
      
      msgEl.textContent = message;
      
      if (type === 'error') {
        toast.style.borderColor = '#F87171'; // red
        iconEl.textContent = '✕';
        iconEl.style.color = '#F87171';
      } else if (type === 'success') {
        toast.style.borderColor = '#4ADE80'; // green
        iconEl.textContent = '✓';
        iconEl.style.color = '#4ADE80';
      } else {
        toast.style.borderColor = 'var(--accent)'; // accent
        iconEl.textContent = 'ℹ';
        iconEl.style.color = 'var(--accent)';
      }

      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '👁‍🗨';
      } else {
        input.type = 'password';
        btn.textContent = '👁';
      }
    }

    function switchTab(type) {
      const loginSec = document.getElementById('loginSection');
      const signupSec = document.getElementById('signupSection');
      
      // Remove active class for fade out
      loginSec.classList.remove('active');
      signupSec.classList.remove('active');

      setTimeout(() => {
        if (type === 'signup') {
          loginSec.style.display = 'none';
          signupSec.style.display = 'block';
          document.getElementById('authTitle').textContent = 'Create Account';
          document.getElementById('authSubtitle').textContent = 'Join Penypilot to manage your finances';
          
          // trigger reflow
          void signupSec.offsetWidth;
          signupSec.classList.add('active');
        } else {
          signupSec.style.display = 'none';
          loginSec.style.display = 'block';
          document.getElementById('authTitle').textContent = 'Welcome Back';
          document.getElementById('authSubtitle').textContent = 'Enter your credentials to continue';
          
          // trigger reflow
          void loginSec.offsetWidth;
          loginSec.classList.add('active');
        }
      }, 150); // slight delay to allow fade out
    }

    function handleSignup() {
      if (!appState) appState = {};
      
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;

      // Ensure minimal empty structures exist
      if(!appState.incomes) appState.incomes = [];
      if(!appState.expenses) appState.expenses = [];
      if(!appState.envelopes) appState.envelopes = [];
      
      appState.userProfile = {
        fullName: document.getElementById('regFullName').value.trim(),
        nickname: document.getElementById('regNickname').value.trim(),
        mobile: document.getElementById('regMobile').value.trim(),
        email: email,
        password: password, 
        image: '',
        gender: document.getElementById('regGender').value,
        dob: '',
        address: document.getElementById('regAddress').value.trim()
      };
      
      localStorage.setItem('flowfund_state', JSON.stringify(appState));
      showToast('Account created successfully! Please log in.', 'success');
      
      setTimeout(() => {
        switchTab('login');
        document.getElementById('loginEmail').value = email;
        document.getElementById('loginPassword').value = '';
        document.getElementById('loginPassword').focus();
      }, 1000);
    }

    function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!appState.userProfile || !appState.userProfile.email) {
        showToast('No account found. Please sign up first.', 'error');
        return;
      }

      if (appState.userProfile.email === email && appState.userProfile.password === password) {
        showToast('Login successful!', 'success');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 800);
      } else {
        showToast('Invalid email or password.', 'error');
      }
    }
  </script>
</body>
</html>
